<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday ❤️</title>

<style>
body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  font-family: 'Segoe UI', sans-serif;

  /* 🌸 your background */
  background: url('assets/images/1777185695083.png') no-repeat center/cover;

  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
}

/* soft overlay */
.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(255,255,255,0.3);
}

/* main content */
.content {
  position: relative;
  z-index: 2;
}

/* heading */
h1 {
  font-size: 60px;
  color: #ff4b7d;
  text-shadow: 0 0 20px rgba(255,75,125,0.6);
  animation: pop 1.5s ease;
}

/* sub text */
p {
  font-size: 20px;
  color: #5a2a2a;
  margin-top: 10px;
}

/* pop animation */
@keyframes pop {
  0% { transform: scale(0.5); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}

/* confetti */
.confetti {
  position: absolute;
  width: 8px;
  height: 8px;
  background: pink;
  opacity: 0.7;
  animation: fall linear infinite;
}

@keyframes fall {
  from { transform: translateY(-10vh); }
  to { transform: translateY(110vh); }
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="content">
  <h1>Happy Birthday Pichi 🎉</h1>
  <p>You make my world beautiful 💖</p>
</div>

<script>
// 🎉 confetti effect
for (let i = 0; i < 80; i++) {
  let c = document.createElement("div");
  c.className = "confetti";

  c.style.left = Math.random() * 100 + "vw";
  c.style.animationDuration = (3 + Math.random() * 3) + "s";
  c.style.background = ["#ff4b7d","#ff8fa3","#ffc2d1","#ffccd5"][Math.floor(Math.random()*4)];

  document.body.appendChild(c);
}
</script>

</body>
</html>
