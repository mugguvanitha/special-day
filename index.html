<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hey Pichi ❤️</title>

<style>
body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  font-family: 'Segoe UI', sans-serif;

  /* 🌸 YOUR BACKGROUND */
  background: url('assets/images/bg.jpg') no-repeat center/cover;
}

/* dark overlay */
.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.35);
}

/* text container */
.container {
  position: absolute;
  top: 18%;
  left: 8%;
  color: white;
  font-size: 26px;
  line-height: 1.8;
  width: 70%;
}

/* each line */
.line {
  opacity: 0;
  transform: translateY(20px);
  animation: fadeUp 1s forwards;
}

@keyframes fadeUp {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* 🐱 CAT */
.cat {
  position: absolute;
  bottom: 80px;
  right: 30px;
  width: 140px;
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}

/* 💖 BUTTONS */
.buttons {
  position: absolute;
  bottom: 20px;
  left: 20px;
}

button {
  padding: 10px 20px;
  margin-right: 10px;
  border: none;
  border-radius: 20px;
  background: rgba(255,255,255,0.9);
  color: #ff4b7d;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.1);
}

/* particles */
.particle {
  position: absolute;
  width: 5px;
  height: 5px;
  background: pink;
  border-radius: 50%;
  opacity: 0.6;
  animation: floatUp linear infinite;
}

@keyframes floatUp {
  from { transform: translateY(100vh); }
  to { transform: translateY(-10vh); }
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="container" id="textContainer"></div>

<!-- 🐱 cat -->
<img src="assets/images/cat.gif" class="cat">

<!-- 💖 buttons -->
<div class="buttons">
  <button onclick="nextPage()">Next ➡️</button>
  <button onclick="skip()">Skip ⏭️</button>
</div>

<script>
let messages = [
  "Hey Pichi ❤️",
  "I wanted to do something special for you…",
  "Not just something normal 😌",
  "Because you are special to me 💖",
  "So I made this… just for you ✨"
];

let container = document.getElementById("textContainer");

messages.forEach((msg, i) => {
  setTimeout(() => {
    let div = document.createElement("div");
    div.className = "line";
    div.innerText = msg;
    container.appendChild(div);
  }, i * 2500);
});

// auto next
setTimeout(() => {
  nextPage();
}, messages.length * 2500 + 2000);

function nextPage() {
  window.location.href = "second.html";
}

function skip() {
  window.location.href = "gifts.html";
}

// particles
for (let i = 0; i < 35; i++) {
  let p = document.createElement("div");
  p.className = "particle";
  p.style.left = Math.random() * 100 + "vw";
  p.style.animationDuration = (5 + Math.random() * 5) + "s";
  document.body.appendChild(p);
}
</script>

</body>
</html>
