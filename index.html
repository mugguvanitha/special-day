<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hey Pichi ❤️</title>

<style>
body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  font-family: 'Segoe UI', sans-serif;

  /* 🌸 Aesthetic background image */
  background: url('assets/images/bg.jpg') no-repeat center/cover;
  backdrop-filter: blur(4px);
}

/* overlay for softness */
.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.3);
}

/* text container */
.container {
  position: absolute;
  top: 20%;
  left: 10%;
  color: white;
  font-size: 28px;
  line-height: 1.8;
}

/* each line */
.line {
  opacity: 0;
  transform: translateY(20px);
  animation: fadeUp 1s forwards;
}

@keyframes fadeUp {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* cute image */
.cat {
  position: absolute;
  bottom: 20px;
  right: 20px;
  width: 120px;
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

/* particles */
.particle {
  position: absolute;
  width: 5px;
  height: 5px;
  background: pink;
  border-radius: 50%;
  opacity: 0.6;
  animation: floatUp linear infinite;
}

@keyframes floatUp {
  from { transform: translateY(100vh); }
  to { transform: translateY(-10vh); }
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="container" id="textContainer"></div>

<!-- 🐱 cute image -->
<img src="assets/images/cat.gif" class="cat">

<script>
let messages = [
  "Hey Pichi ❤️",
  "I wanted to do something special for you…",
  "Not just a normal thing 😌",
  "Because you are special to me 💖",
  "So I made this… just for you ✨"
];

let container = document.getElementById("textContainer");

messages.forEach((msg, i) => {
  setTimeout(() => {
    let div = document.createElement("div");
    div.className = "line";
    div.innerText = msg;
    container.appendChild(div);
  }, i * 2500); // slow timing
});

// go next after all lines
setTimeout(() => {
  window.location.href = "second.html";
}, messages.length * 2500 + 2000);

// particles
for (let i = 0; i < 30; i++) {
  let p = document.createElement("div");
  p.className = "particle";
  p.style.left = Math.random() * 100 + "vw";
  p.style.animationDuration = (5 + Math.random() * 5) + "s";
  document.body.appendChild(p);
}
</script>

</body>
</html>
