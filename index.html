<!DOCTYPE html>
<html>
<head>
<title>Hey Pichi ❤️</title>
<style>
body {
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(to right,#ff9a9e,#fad0c4);
  color:white;
  font-family:Arial;
  text-align:center;
}
#text {font-size:28px;opacity:0;transition:1s;}
</style>
</head>

<body>
<div id="text"></div>

<script>
let msg=[
"Hey Pichi ❤️",
"I made something special for you 😌",
"Wait for it… 🎁"
];
let i=0;
let t=document.getElementById("text");

function show(){
 if(i<msg.length){
  t.style.opacity=0;
  setTimeout(()=>{
   t.innerHTML=msg[i];
   t.style.opacity=1;
   i++;
  },500);
  setTimeout(show,2500);
 } else {
  window.location="second.html";
 }
}
show();
</script>
</body>
</html>
