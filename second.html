<!DOCTYPE html>
<html>
<head>
<style>
body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#ff9a9e;
color:white;
font-family:Arial;
text-align:center;
}
#text{font-size:26px;opacity:0;transition:1s;}
</style>
</head>

<body>
<div id="text"></div>

<script>
let msg=[
"Are you excited…? 😏",
"To see what I made… 💖",
"But wait…",
"I have a question 😌"
];
let i=0,t=document.getElementById("text");

function show(){
 if(i<msg.length){
  t.style.opacity=0;
  setTimeout(()=>{
   t.innerHTML=msg[i];
   t.style.opacity=1;
   i++;
  },500);
  setTimeout(show,2500);
 } else {
  window.location="gifts.html";
 }
}
show();
</script>
</body>
</html>
